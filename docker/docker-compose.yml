version: "3.9"

services:
  # ============================================
  # MongoDB Database
  # ============================================
  mongodb:
    image: mongo:6.0
    container_name: amazon-go-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: amazon-go
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - amazon-go-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend API Service
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: amazon-go-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      ml-service:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USERNAME:-root}:${MONGO_PASSWORD:-password}@mongodb:27017/amazon-go?authSource=admin
      ML_SERVICE_URL: http://ml-service:8000
      ML_SERVICE_TIMEOUT: 30000
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRE: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HEALTH_CHECK_ENABLED: "true"
      HEALTH_CHECK_INTERVAL: 30000
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - amazon-go-network
    healthcheck:
      test: curl -f http://localhost:5000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ============================================
  # ML Service
  # ============================================
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: amazon-go-ml-service
    ports:
      - "${ML_SERVICE_PORT:-8000}:8000"
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app
    volumes:
      - ./ml-service/app:/app/app
      - ./ml-service/saved_models:/app/saved_models
      - ./ml-service/data:/app/data
    networks:
      - amazon-go-network
    healthcheck:
      test: curl -f http://localhost:8000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # Frontend Service (Optional)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: amazon-go-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-5000}/api
      VITE_SOCKET_URL: http://localhost:${BACKEND_PORT:-5000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - amazon-go-network
    restart: unless-stopped

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: amazon-go-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - amazon-go-network
    restart: unless-stopped

# ============================================
# Networks
# ============================================
networks:
  amazon-go-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
